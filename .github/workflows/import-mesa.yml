name: Import Mesa + Apply K3 Patches

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  import:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout this repo (patches)
        uses: actions/checkout@v4
        with:
          path: patches-repo

      - name: Clone Mesa (depth=1000)
        run: |
          git clone --depth=1000 --single-branch --branch main \
            https://gitlab.freedesktop.org/mesa/mesa.git mesa
          cd mesa
          git log --oneline | grep -q cff8dbd && echo "BASE FOUND" \
            || { echo "cff8dbd not found"; exit 1; }

      - name: Apply K3 patches
        run: |
          cd mesa
          git config user.email "perise@gmail.com"
          git config user.name "perise"
          git checkout -b k3-optimizations cff8dbd4
          git am ../patches-repo/000*.patch
          git log --oneline -8

      - name: Push branches (with debug output)
        env:
          TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          cd mesa
          DEST="https://x-access-token:${TOKEN}@github.com/perise/mesa-pvr.git"
          git remote add dest "$DEST"
          echo "=== Token type check ===" > /tmp/push-debug.txt
          echo "Token starts with: ${TOKEN:0:4}" >> /tmp/push-debug.txt
          echo "=== Repo permissions ===" >> /tmp/push-debug.txt
          curl -s -H "Authorization: Bearer ${TOKEN}" \
            https://api.github.com/repos/perise/mesa-pvr \
            | python3 -c "import json,sys; r=json.load(sys.stdin); print('push:', r.get('permissions',{}).get('push'), 'admin:', r.get('permissions',{}).get('admin'))" \
            >> /tmp/push-debug.txt 2>&1
          echo "=== Push mesa-upstream ===" >> /tmp/push-debug.txt
          git push --force dest main:mesa-upstream >> /tmp/push-debug.txt 2>&1
          echo "push exit: $?" >> /tmp/push-debug.txt
          echo "=== Push k3-optimizations ===" >> /tmp/push-debug.txt
          git push --force dest k3-optimizations >> /tmp/push-debug.txt 2>&1
          echo "push exit: $?" >> /tmp/push-debug.txt
          cat /tmp/push-debug.txt

      - name: Upload debug log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: push-debug
          path: /tmp/push-debug.txt
