name: Import Mesa + Apply K3 Patches

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  import:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout this repo (patches)
        uses: actions/checkout@v4
        with:
          path: patches-repo
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup git auth for push
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh auth setup-git
          git config --global user.email "perise@gmail.com"
          git config --global user.name "perise"

      - name: Clone Mesa from upstream
        run: |
          git clone --depth=500 --single-branch --branch main \
            https://gitlab.freedesktop.org/mesa/mesa.git mesa
          cd mesa
          git log --oneline -3
          git log --oneline | grep cff8dbd && echo "BASE FOUND" \
            || { echo "ERROR: cff8dbd not found, use --depth=1000"; exit 1; }

      - name: Create k3-optimizations branch and apply patches
        run: |
          cd mesa
          git checkout -b k3-optimizations cff8dbd4
          git am ../patches-repo/000*.patch
          git log --oneline -8

      - name: Push to perise/mesa-pvr
        run: |
          cd mesa
          git remote add dest https://github.com/perise/mesa-pvr.git
          git push --force dest main 2>&1 && echo "main pushed"
          git push --force dest k3-optimizations 2>&1 && echo "k3-optimizations pushed"
          git ls-remote dest refs/heads/main refs/heads/k3-optimizations
