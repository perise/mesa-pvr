name: Import Mesa + Apply K3 Patches

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  import:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout this repo (patches)
        uses: actions/checkout@v4
        with:
          path: patches-repo

      - name: Clone Mesa (depth=1000)
        run: |
          git clone --depth=1000 --single-branch --branch main \
            https://gitlab.freedesktop.org/mesa/mesa.git mesa
          cd mesa
          git log --oneline | grep -q cff8dbd && echo "BASE FOUND" \
            || { echo "cff8dbd not found"; exit 1; }

      - name: Apply K3 patches
        run: |
          cd mesa
          git config user.email "perise@gmail.com"
          git config user.name "perise"
          git checkout -b k3-optimizations cff8dbd4
          git am ../patches-repo/000*.patch
          git log --oneline -8

      - name: Debug token and push
        env:
          TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set +e
          echo "Token prefix: ${TOKEN:0:4}"
          echo "--- Repo API permissions ---"
          curl -s -H "Authorization: Bearer ${TOKEN}" \
            https://api.github.com/repos/perise/mesa-pvr \
            | python3 -c "
import json,sys
r=json.load(sys.stdin)
p=r.get('permissions',{})
print('push:', p.get('push'), 'admin:', p.get('admin'), 'maintain:', p.get('maintain'))
print('private:', r.get('private'))
print('default_branch:', r.get('default_branch'))
"
          echo "--- Attempting push: main -> mesa-upstream ---"
          cd mesa
          git remote add dest "https://x-access-token:${TOKEN}@github.com/perise/mesa-pvr.git"
          git push --force --verbose dest main:mesa-upstream
          echo "EXIT_MAIN=$?"
          echo "--- Attempting push: k3-optimizations ---"
          git push --force --verbose dest k3-optimizations
          echo "EXIT_K3=$?"
