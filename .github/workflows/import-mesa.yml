name: Import Mesa + Apply K3 Patches

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  import:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout this repo (patches)
        uses: actions/checkout@v4
        with:
          path: patches-repo

      - name: Clone Mesa (depth=1000)
        run: |
          git clone --depth=1000 --single-branch --branch main \
            https://gitlab.freedesktop.org/mesa/mesa.git mesa
          cd mesa
          git log --oneline | grep -q cff8dbd && echo "BASE FOUND" \
            || { echo "cff8dbd not found"; exit 1; }

      - name: Apply K3 patches
        run: |
          cd mesa
          git config user.email "perise@gmail.com"
          git config user.name "perise"
          git checkout -b k3-optimizations cff8dbd4
          git am ../patches-repo/000*.patch
          git log --oneline -8

      - name: Debug and push
        env:
          TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set +e
          echo "Token prefix: ${TOKEN:0:4}"
          echo "--- Repo permissions ---"
          curl -s -H "Authorization: Bearer ${TOKEN}" \
            https://api.github.com/repos/perise/mesa-pvr \
            | jq '{push: .permissions.push, admin: .permissions.admin, private: .private, default_branch: .default_branch}'
          cd mesa
          DEST="https://x-access-token:${TOKEN}@github.com/perise/mesa-pvr.git"
          git remote add dest "$DEST"
          echo "--- Push main -> mesa-upstream ---"
          git push --force --verbose dest main:mesa-upstream
          echo "EXIT_MAIN=$?"
          echo "--- Push k3-optimizations ---"
          git push --force --verbose dest k3-optimizations
          echo "EXIT_K3=$?"
