name: Import Mesa + Apply K3 Patches

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  import:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout this repo (patches)
        uses: actions/checkout@v4
        with:
          path: patches-repo

      - name: Clone Mesa (depth=1000)
        run: |
          git clone --depth=1000 --single-branch --branch main \
            https://gitlab.freedesktop.org/mesa/mesa.git mesa
          cd mesa
          git log --oneline | grep -q cff8dbd \
            && echo "BASE FOUND" || { echo "cff8dbd not found"; exit 1; }

      - name: Apply K3 patches
        run: |
          cd mesa
          git config user.email "perise@gmail.com"
          git config user.name "perise"
          git checkout -b k3-optimizations cff8dbd4
          git am ../patches-repo/000*.patch
          git log --oneline -8

      - name: Push branches (mesa-upstream + k3-optimizations)
        env:
          TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          cd mesa
          DEST="https://x-access-token:${TOKEN}@github.com/perise/mesa-pvr.git"
          git remote add dest "$DEST"
          # Push upstream mesa as 'mesa-upstream' (avoids default branch conflict)
          git push --force dest main:mesa-upstream
          echo "mesa-upstream pushed"
          # Push our K3 branch
          git push --force dest k3-optimizations:k3-optimizations
          echo "k3-optimizations pushed"
          git ls-remote dest refs/heads/mesa-upstream refs/heads/k3-optimizations
