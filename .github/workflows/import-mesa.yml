name: Import Mesa + Apply K3 Patches

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  import:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout this repo (patches)
        uses: actions/checkout@v4
        with:
          path: patches-repo

      - name: Clone Mesa from upstream (shallow since 2026-06-10)
        run: |
          git clone --shallow-since=2026-06-10 --single-branch --branch main \
            https://gitlab.freedesktop.org/mesa/mesa.git mesa
          cd mesa
          echo "--- last 5 commits ---"
          git log --oneline -5
          echo "--- checking for base commit cff8dbd ---"
          git log --oneline | grep cff8dbd && echo "BASE FOUND" || (echo "BASE NOT FOUND - need deeper clone"; exit 1)

      - name: Create k3-optimizations branch and apply patches
        run: |
          cd mesa
          git config user.email "perise@gmail.com"
          git config user.name "perise"
          git checkout -b k3-optimizations cff8dbd4
          echo "=== applying patches ==="
          git am ../patches-repo/000*.patch
          echo "=== result ==="
          git log --oneline -8

      - name: Push main and k3-optimizations
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          cd mesa
          git remote add dest \
            https://x-access-token:${GITHUB_TOKEN}@github.com/${{ github.repository }}.git
          echo "Pushing main..."
          git push --force dest main
          echo "Pushing k3-optimizations..."
          git push --force dest k3-optimizations
          echo "Done! Branches pushed:"
          git ls-remote dest refs/heads/main refs/heads/k3-optimizations
