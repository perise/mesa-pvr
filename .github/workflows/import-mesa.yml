name: Import Mesa + Apply K3 Patches

on:
  workflow_dispatch:

permissions:
  contents: write
  workflows: write

jobs:
  import:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout this repo (patches)
        uses: actions/checkout@v4
        with:
          path: patches-repo

      - name: Clone Mesa (depth=1000)
        run: |
          git clone --depth=1000 --single-branch --branch main \
            https://gitlab.freedesktop.org/mesa/mesa.git mesa
          cd mesa
          git log --oneline | grep -q cff8dbd && echo "BASE FOUND" \
            || { echo "cff8dbd not found"; exit 1; }

      - name: Create orphan branch + apply K3 patches
        run: |
          cd mesa
          git config user.email "perise@gmail.com"
          git config user.name "perise"

          # Create orphan root from cff8dbd4 tree — no parent = no shallow boundary issue
          BASE_TREE=$(git cat-file -p cff8dbd4 | grep '^tree' | awk '{print $2}')
          ROOT=$(git commit-tree "$BASE_TREE" \
            -m "Mesa base: cff8dbd452b8 (2026-06-16) [K3 SpacemiT branch root]")
          echo "Orphan root: $ROOT"

          git checkout -b k3-optimizations "$ROOT"
          git am ../patches-repo/000*.patch
          git log --oneline -8

      - name: Push to GitHub
        env:
          TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          cd mesa
          git config http.postBuffer 524288000
          DEST="https://x-access-token:${TOKEN}@github.com/perise/mesa-pvr.git"
          git remote add dest "$DEST"
          git push --force --verbose dest k3-optimizations
          echo "EXIT=$?"
