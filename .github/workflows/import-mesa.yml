name: Import Mesa + Apply K3 Patches

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  import:
    runs-on: ubuntu-latest
    env:
      GIT_AUTHOR_NAME: perise
      GIT_AUTHOR_EMAIL: perise@gmail.com
      GIT_COMMITTER_NAME: perise
      GIT_COMMITTER_EMAIL: perise@gmail.com
    steps:
      - name: Checkout this repo (patches)
        uses: actions/checkout@v4
        with:
          path: patches-repo

      - name: Clone Mesa (depth=1000)
        run: |
          git clone --depth=1000 --single-branch --branch main \
            https://gitlab.freedesktop.org/mesa/mesa.git mesa
          cd mesa
          git log --oneline | grep -q cff8dbd \
            && echo "BASE FOUND: $(git log --oneline | grep cff8dbd)" \
            || { echo "ERROR: cff8dbd not found"; exit 1; }

      - name: Apply K3 patches
        run: |
          cd mesa
          git checkout -b k3-optimizations cff8dbd4
          git am ../patches-repo/000*.patch
          git log --oneline -8

      - name: Push to perise/mesa-pvr
        env:
          TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          cd mesa
          git remote add dest "https://x-access-token:${TOKEN}@github.com/perise/mesa-pvr.git"
          git push --force dest main && echo "main OK"
          git push --force dest k3-optimizations && echo "k3-optimizations OK"
